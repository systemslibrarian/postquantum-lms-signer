name: Release

# Tag a version (e.g. `git tag v0.9.0 && git push origin v0.9.0`) to build, attest, and publish.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # OIDC: build-provenance attestations + NuGet Trusted Publishing
  attestations: write   # write the provenance attestation

jobs:
  release:
    name: Pack, attest & publish
    runs-on: ubuntu-latest
    env:
      # Publishing uses NuGet Trusted Publishing (OIDC) — no long-lived API key is stored.
      # NUGET_USER is only your nuget.org profile name (an identifier, not a credential);
      # publishing is skipped when it is unset. SIGN_CERT_* remain optional secrets.
      NUGET_USER: ${{ secrets.NUGET_USER }}
      SIGN_CERT_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
      SIGN_CERT_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test (net8.0 + net10.0)
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack -c Release --no-restore -o ./artifacts

      - name: Generate SBOMs (CycloneDX, one per package)
        run: |
          set -euo pipefail
          dotnet tool install --global CycloneDX
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p ./artifacts/sbom
          for proj in src/*/*.csproj; do
            name="$(basename "$proj" .csproj)"
            echo "SBOM: $name"
            dotnet CycloneDX "$proj" --json --output ./artifacts/sbom --filename "$name.cyclonedx.json"
          done

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd ./artifacts
          sha256sum *.nupkg *.snupkg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest build provenance for packages
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Sign packages (only if a signing certificate secret is configured)
        if: ${{ env.SIGN_CERT_BASE64 != '' }}
        run: |
          set -euo pipefail
          echo "$SIGN_CERT_BASE64" | base64 -d > codesign.pfx
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget sign "$pkg" \
              --certificate-path codesign.pfx \
              --certificate-password "$SIGN_CERT_PASSWORD" \
              --timestamper http://timestamp.digicert.com
          done
          rm -f codesign.pfx

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1-hour) NuGet
      # API key. Run this immediately before the push so the temporary key hasn't expired.
      # Requires a trusted-publishing policy on nuget.org matching this repo + workflow file.
      - name: NuGet login (Trusted Publishing → short-lived API key)
        id: nuget-login
        if: ${{ env.NUGET_USER != '' }}
        uses: NuGet/login@v1
        with:
          user: ${{ env.NUGET_USER }}

      - name: Publish to NuGet.org (only if NUGET_USER is configured)
        if: ${{ env.NUGET_USER != '' }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: ./artifacts/**

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
            ./artifacts/SHA256SUMS.txt
            ./artifacts/sbom/*.json
